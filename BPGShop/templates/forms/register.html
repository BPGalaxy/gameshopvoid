{% extends 'base.html' %}
{% block style %}
  {% include 'static/css/voidrift.css' %}
{% endblock %}
{% block content %}
<button class="check-btn" style="position: fixed; top: 20px; right: 20px; width: 200px;" onclick="window.location.href='/'">Back to homepage</button>
<div class="auth-wrapper">

  <div class="auth-logo">VOID<span>RIFT</span></div>
  <div class="auth-tagline">// Join the Galaxy</div>

  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-card-title">Create Account</div>
      <div class="auth-card-sub">// Register your commander profile</div>
    </div>

    <div class="auth-error" id="errorMsg"></div>
    <div class="auth-success" id="successMsg">✦ &nbsp;Checking datas...</div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" name="Username" placeholder="commander_zero" autocomplete="username"/>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" name="Email" placeholder="commander_zero@example.com" autocomplete="email"/>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>First Name</label>
          <input type="text" id="First_Name" name="First_Name" placeholder="Jane" autocomplete="given-name"/>
        </div>
        <div class="input-group">
          <label>Last Name</label>
          <input type="text" id="Last_Name" name="Last_Name" placeholder="Doe" autocomplete="family-name"/>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="Password" placeholder="••••••••••••" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button class="toggle-pw" type="button" onclick="togglePw('password', this)" aria-label="Toggle password">👁</button>
        </div>
        <div class="strength-bar" id="strengthBar">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <button class="auth-submit" onclick="handleRegister()">
        <span class="btn-shine"></span>
        Create Account
      </button>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-switch">
      Already have an account? <a href="{% url 'login' %}">Login</a>
    </div>
  </div>

</div>

<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
  }

  const strengthLevels = ['', 'Weak', 'Fair', 'Good', 'Strong'];

  function checkStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const bar = document.getElementById('strengthBar');
    const lbl = document.getElementById('strengthLabel');
    bar.className = 'strength-bar' + (score ? ` s${score}` : '');
    lbl.textContent = val.length ? `// Strength: ${strengthLevels[score]}` : '';
  }

  function handleRegister() {
    const Username  = document.getElementById('username').value.trim();
    const Email     = document.getElementById('email').value.trim();
    const First_Name = document.getElementById('First_Name').value.trim();
    const Last_Name  = document.getElementById('Last_Name').value.trim();
    const Password  = document.getElementById('password').value;
    const error     = document.getElementById('errorMsg');
    const success   = document.getElementById('successMsg');

    error.classList.remove('visible');
    success.classList.remove('visible');

    if (!Username || !Email || !First_Name || !Last_Name || !Password) {
      error.textContent = '⚠ \u00a0Please fill in all fields.';
      error.classList.add('visible');
      return;
    }
    if (Username.length < 3) {
      error.textContent = '⚠ \u00a0Username must be at least 3 characters.';
      error.classList.add('visible');
      return;
    }
    if (Password.length < 8) {
      error.textContent = '⚠ \u00a0Password must be at least 8 characters.';
      error.classList.add('visible');
      return;
    }

    success.classList.add('visible');
      setTimeout(() => {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '{% url "register" %}';
        const fields = { Username: Username, Email: Email, First_name: First_Name, Last_name: Last_Name, Password: Password };
        const csrf = document.createElement('input');
        csrf.type = 'hidden';
        csrf.name = 'csrfmiddlewaretoken';
        csrf.value = '{{ csrf_token }}';
        form.appendChild(csrf);
        Object.entries(fields).forEach(([name, value]) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = name;
          input.value = value;
          form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
      }, 1600);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
</script>
{% endblock %}
