<style>
    {% include 'static/css/voidrift.css' %}
</style>


{% if messages %}
<div class="onetimemessages-container" style="position: fixed; z-index: 9999; top: 20px; display: flex; flex-direction: column; gap: 10px;">
    {% for message in messages %}
    <div class="onetimemessage onetimemessage-{{ message.tags }}" id="onetimemessage-{{ forloop.counter }}">
        <div class="auth-{{message.tags}} visible" id="errorMsg">{{ message }}</div>
    </div>
    {% endfor %}
</div>
{% endif %}

<script>
function closeMessage(messageId) {
    const onetimemessage = document.getElementById(onetimemessageId);
    if (onetimemessage) {
        onetimemessage.classList.add('fade-out');
        setTimeout(() => {
            onetimemessage.remove();
        }, 300);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const messages = document.querySelectorAll('.onetimemessage');
    messages.forEach(message => {
        setTimeout(() => {
            if (message.parentNode) {
                message.classList.add('fade-out');
                setTimeout(() => {
                    if (message.parentNode) {
                        message.remove();
                    }
                }, 300);
            }
        }, 3000);
    });
});
</script>
